server:
  port: 3773
spring:
  application:
    name: heroesofddd
  threads:
    virtual:
      enabled: true
  ai:
    mcp:
      server:
        enabled: true
        name: "Heroes of Might & Magic III - DDD/Event Sourcing Server"
        version: "1.0.0"
        instructions: "MCP server for Heroes of Might & Magic III domain built with DDD, Event Sourcing, and Axon Framework. Provides domain operations, game management tools, and educational DDD resources."
  datasource:
    url: jdbc:postgresql://localhost:6446/heroes_of_ddd_development
    username: heroes_of_ddd_db_user
    password: heroes_of_ddd_db_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
axon:
  axonserver:
    enabled: false
    # AF5: When axon-server is disabled and JPA is on classpath,
    # JpaEventStorageEngine is auto-configured.
  # AF5: axon.serializer.* removed. Serialization is now handled via Converters.
  # Message payloads use Jackson-based converters by default when jackson is on classpath.
  eventhandling:
    processors:
      Automation_WhenCreatureRecruitedThenAddToArmy_Processor:
        # AF5: 'mode' removed - pooled streaming is the only supported mode for streaming processors.
        sequencing-policy: gameIdSequencingPolicy
        dlq:
          enabled: true
      Automation_WhenWeekStartedThenProclaimWeekSymbol_Processor:
        sequencing-policy: gameIdSequencingPolicy
        dlq:
          enabled: true
      Automation_WhenWeekSymbolProclaimedThenIncreaseDwellingAvailableCreatures_Processor:
        sequencing-policy: gameIdSequencingPolicy
        dlq:
          enabled: true
      ReadModel_Dwelling:
        sequencing-policy: gameIdSequencingPolicy
        initial-segment-count: 2
        batch-size: 5
      Read_GetAllDwellings_QueryCache:
        # AF5: subscribing mode no longer supported; use pooled streaming processor.
        sequencing-policy: gameIdSequencingPolicy
application:
  maintenance:
    enabled: true
  interceptors:
    paid-commands:
      enabled: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    docExpansion: none

axoniq:
  console:
    application-name: HeroesOfDDD-Axon5
    credentials: XYZ
    dlq-mode: FULL
